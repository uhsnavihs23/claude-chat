<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat — Puter.js</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://js.puter.com/v2/"></script>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <!-- Skip link -->
  <a href="#chat-input" class="sr-only">Skip to chat input</a>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Sidebar">
      <div class="sidebar-header">
        <div class="logo" aria-label="Claude Chat">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect x="2" y="2" width="28" height="28" rx="8" fill="var(--color-primary)"/>
            <path d="M10 22L16 10L22 22" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12.5 18H19.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">ClaudeChat</span>
        </div>
        <button class="icon-btn" id="theme-toggle" data-theme-toggle aria-label="Switch theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="new-chat-btn" aria-label="New chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>

      <div class="model-select-wrap">
        <label for="model-select" class="select-label">Model</label>
        <select id="model-select" class="model-select" aria-label="Select Claude model">
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="claude-opus-4-7">Claude Opus 4.7</option>
          <option value="claude-opus-4-6">Claude Opus 4.6</option>
          <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
          <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
          <option value="claude-3-7-sonnet">Claude 3.7 Sonnet</option>
          <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
        </select>
      </div>

      <div class="sidebar-section-title">History</div>
      <div class="chat-history" id="chat-history" role="list" aria-label="Chat history">
        <!-- populated by JS -->
      </div>

      <div class="sidebar-footer">
        <span class="powered-by">Powered by <a href="https://puter.com" target="_blank" rel="noopener noreferrer">Puter.js</a> · Free & Unlimited</span>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <header class="topbar">
        <button class="icon-btn sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar" aria-expanded="true" aria-controls="sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-model" id="topbar-model">Claude Sonnet 4.6</span>
        <button class="icon-btn" id="clear-chat" aria-label="Clear conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </header>

      <div class="messages-wrap" id="messages-wrap" role="log" aria-live="polite" aria-label="Conversation">
        <!-- Welcome screen -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon" aria-hidden="true">
            <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
              <rect x="2" y="2" width="28" height="28" rx="8" fill="var(--color-primary)"/>
              <path d="M10 22L16 10L22 22" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12.5 18H19.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h1>How can I help you today?</h1>
          <p>Free, unlimited Claude access via Puter.js. No API key required.</p>
          <div class="suggestions" role="list">
            <button class="suggestion-chip" role="listitem">Write a Python data cleaning script</button>
            <button class="suggestion-chip" role="listitem">Explain a regex pattern</button>
            <button class="suggestion-chip" role="listitem">Debug my Google Apps Script</button>
            <button class="suggestion-chip" role="listitem">Summarize this text for me</button>
          </div>
        </div>
        <!-- messages go here -->
      </div>

      <div class="input-area">
        <div class="input-box">
          <textarea
            id="chat-input"
            class="chat-textarea"
            placeholder="Message Claude…"
            rows="1"
            aria-label="Chat message"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button class="send-btn" id="send-btn" aria-label="Send message" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p class="input-hint">Puter "User-Pays" model — your account covers costs. <a href="https://puter.com" target="_blank" rel="noopener noreferrer">Sign in to Puter</a> for higher limits.</p>
      </div>
    </main>
  </div>

  <script src="./assets/app.js"></script>
</body>
</html>
