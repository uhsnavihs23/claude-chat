<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Chat</title>
  <meta name="description" content="Free AI chat using OpenRouter models">
  <meta name="theme-color" content="#0c0c0b">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- App config (sets window.APP_CONFIG.PROXY_URL) -->
  <script src="config.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="app-shell">

  <!-- ═══ SIDEBAR ════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar" role="complementary" aria-label="Settings and history">

    <div class="sidebar-header">
      <div class="logo">
        <!-- SVG logo -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="logo-text">Claude Chat</span>
      </div>
      <div style="display:flex;gap:4px;align-items:center;">
        <!-- Theme toggle -->
        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light mode">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <!-- Collapse sidebar -->
        <button class="icon-btn" id="sidebarToggle" aria-label="Collapse sidebar" title="Collapse sidebar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- API Key -->
    <div class="field-group">
      <label class="field-label" for="apiKey">
        API Key (optional)
        <a class="field-link" href="https://openrouter.ai/keys" target="_blank" rel="noopener">Get key ↗</a>
      </label>
      <div class="key-wrap">
        <input class="key-input" id="apiKey" type="password"
               placeholder="sk-or-…  (leave blank to use proxy)"
               autocomplete="off" spellcheck="false">
        <button class="key-vis-btn icon-btn" aria-label="Show/hide key">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="key-status" id="keyStatus"></span>
    </div>

    <!-- Model picker -->
    <div class="field-group">
      <label class="field-label" for="modelSelect">Model</label>
      <div class="select-wrap">
        <select id="modelSelect" aria-label="Select AI model">
          <option value="">Loading models…</option>
        </select>
        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <!-- New chat -->
    <button class="new-chat-btn" aria-label="New chat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New chat
    </button>

    <!-- System prompt -->
    <div class="field-group">
      <label class="field-label" for="sysPrompt">System prompt</label>
      <textarea class="sys-textarea" id="sysPrompt"
                placeholder="You are a helpful assistant…"
                rows="3" spellcheck="true"></textarea>
    </div>

    <!-- Token / stats panel -->
    <div class="stats-panel" aria-label="Session statistics">
      <div class="stats-title">Session</div>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-val" id="statMsgs">0</span>
          <span class="stat-key">messages</span>
        </div>
        <div class="stat-item">
          <span class="stat-val" id="statTokens">0</span>
          <span class="stat-key">~tokens</span>
        </div>
      </div>
      <div class="stat-item" style="margin-top:2px;">
        <span class="stat-key">Model</span>
        <span class="stat-val" id="statModel" style="font-size:var(--text-xs);font-weight:500;">—</span>
      </div>
      <div class="token-bar-wrap">
        <div class="token-bar-track" role="progressbar" aria-label="Context usage">
          <div class="token-bar-fill" id="tokenFill"></div>
        </div>
        <span class="token-bar-label" id="tokenLabel">0 / 128k ctx</span>
      </div>
    </div>

    <!-- Chat history -->
    <div class="sidebar-section-title">History</div>
    <nav class="chat-history" id="historyList" aria-label="Chat history"></nav>

    <div class="sidebar-footer">
      <span class="powered-by">Powered by <a href="https://openrouter.ai" target="_blank" rel="noopener">OpenRouter</a></span>
    </div>

  </aside><!-- /sidebar -->


  <!-- ═══ MAIN ════════════════════════════════════════════════ -->
  <main class="main" role="main">

    <!-- Topbar -->
    <header class="topbar">
      <!-- Expand sidebar (visible when collapsed) -->
      <button class="icon-btn" id="sidebarToggle" aria-label="Open sidebar" title="Open sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <span class="topbar-title" id="topbarTitle">New chat</span>

      <div class="topbar-right">
        <!-- Web search toggle -->
        <button class="icon-btn" id="searchToggle"
                aria-label="Toggle web search" aria-pressed="false"
                title="Web search (off)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>

        <!-- Export -->
        <button class="icon-btn" id="exportBtn" aria-label="Export chat as Markdown" title="Export chat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>

        <!-- Model badge -->
        <span class="topbar-badge" id="topbarBadge" title="">—</span>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages-wrap" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
      <!-- Populated by app.js -->
    </div>

    <!-- File preview strip -->
    <div class="file-strip" id="fileStrip" hidden aria-label="Attached files"></div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-box" id="inputBox">
        <!-- Attach -->
        <button class="attach-btn icon-btn" aria-label="Attach file" title="Attach file (image, PDF, CSV, XLSX, txt)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <input type="file" id="fileInput" multiple hidden
               accept="image/*,.pdf,.txt,.md,.csv,.xlsx,.xls,.json,.py,.js,.ts,.html,.css">

        <!-- Textarea -->
        <textarea class="chat-textarea" id="chatInput"
                  placeholder="Message… (Shift+Enter for new line)"
                  rows="1"
                  aria-label="Chat message input"
                  spellcheck="true"></textarea>

        <!-- Send -->
        <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">
        <strong>Enter</strong> to send &nbsp;·&nbsp; <strong>Shift+Enter</strong> for new line
        &nbsp;·&nbsp; Drag &amp; drop files supported
      </p>
    </div>

  </main><!-- /main -->

</div><!-- /app-shell -->

<!-- Toast notification -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<!-- Optional module scripts (load before app.js) -->
<script src="assets/files.js" defer></script>
<script src="assets/search.js" defer></script>
<script src="assets/ocr.js" defer></script>

<!-- Main app -->
<script src="assets/app.js" defer></script>

<!-- Enable send button only when textarea has content -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const ta  = document.getElementById('chatInput');
    const btn = document.getElementById('sendBtn');
    if (ta && btn) {
      ta.addEventListener('input', () => {
        btn.disabled = !ta.value.trim();
      });
    }
  });
</script>

</body>
</html>
